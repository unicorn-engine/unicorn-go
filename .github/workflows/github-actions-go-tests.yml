name: Push on main trigger

on:
  push:
    branches:
      - main
      - dev

jobs:
  generate_golang_constants:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone unicorn-engine repo
        run: |
          cd build
          git clone https://github.com/unicorn-engine/unicorn

      - name: generate files
        run: |
          cd build
          python3 ./const_generator.py -i ./unicorn/include/unicorn -o ..
          go fmt ..

      - name: Clean up workspace
        run: |
          cd build
          rm -rf ./unicorn

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "update go constants files"
          git push

  run_go_tests_on_latest_release:
    needs: generate_golang_constants
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Get latest unicorn tag"
        id: get_unicorn_latest_tag
        run: |
          output=$(curl "https://api.github.com/repos/unicorn-engine/unicorn/tags" | jq -r '.[0].name')
          echo "::set-output name=unicorn_tag::$(output)"

      - name: Clone unicorn-engine repo
        run: |
          cd build
          git clone https://github.com/unicorn-engine/unicorn -b ${{steps.get_unicorn_latest_tag.outputs.unicorn_tag}}

      - name: Get latest release
        run: |
          cd build
          url="https://github.com/unicorn-engine/unicorn/releases/download/${{steps.get_unicorn_latest_tag.outputs.unicorn_tag}}/ubuntu-cmake-static-x64.7z"
          wget $url
          7z x ubuntu-cmake-static-x64.7z -dubuntu-cmake-static-x64
          ls -la ubuntu-cmake-static-x64

      - name: run tests
        run: |
          # define env to source unicorn
          go test -v .
