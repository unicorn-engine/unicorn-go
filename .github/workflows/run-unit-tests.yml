name: Run unit tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      unicorn_ref:
        description: "Unicorn ref (branch, tag ou commit hash) — overrides matrix"
        required: false
        default: ""

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        unicorn_ref:
          - latest_tag
          - dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install stringer tool
        run: |
          go install golang.org/x/tools/cmd/stringer@latest

      - name: Resolve unicorn ref
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OVERRIDE="${{ github.event.inputs.unicorn_ref }}"
          if [ -n "$OVERRIDE" ]; then
            echo "ref=$OVERRIDE" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.unicorn_ref }}" = "latest_tag" ]; then
            TAG=$(curl -sf https://api.github.com/repos/unicorn-engine/unicorn/releases/latest | jq -r '.tag_name')
            echo "ref=$TAG" >> $GITHUB_OUTPUT
          else
            echo "ref=dev" >> $GITHUB_OUTPUT
          fi

      - name: Clone unicorn-engine
        run: |
          git clone \
            --depth 1 \
            --branch ${{ steps.resolve.outputs.ref }} \
            https://github.com/unicorn-engine/unicorn \
            build/unicorn

      - name: Generate files
        run: |
          cd build
          python3 ./const_generator.py -i ./unicorn/include/unicorn -o ..

      - name: Generate Go related files
        run: |
          stringer -linecomment -type GoUcError -output ./unicorn_go_const_stringers.go ./unicorn_go_const.go

      - name: Format go files
        run: |
          go fmt .

      - name: Build & install unicorn
        run: |
          cd build/unicorn
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Run tests
        run: go test -v .
        env:
          CGO_CFLAGS:  "-I${{ github.workspace }}/unicorn/include"
          CGO_LDFLAGS: "-L${{ github.workspace }}/unicorn/build -lunicorn"
